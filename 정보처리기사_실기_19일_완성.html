<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보처리기사 실기 19일 완성</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f5f5f5;color:#222;display:flex;height:100vh;overflow:hidden;}
/* Sidebar */
#sidebar{width:220px;background:#1a1a2e;color:#ccc;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;}
#sidebar-header{padding:16px 14px 10px;border-bottom:1px solid #333;}
#sidebar-header h1{font-size:13px;font-weight:700;color:#fff;line-height:1.4;}
#sidebar-header p{font-size:11px;color:#888;margin-top:3px;}
.phase-group{margin:0;}
.phase-label{padding:10px 14px 4px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#666;border-top:1px solid #2a2a3e;}
.day-btn{width:100%;text-align:left;padding:8px 14px;background:none;border:none;color:#aaa;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;}
.day-btn:hover{background:#2a2a3e;color:#ddd;}
.day-btn.active{background:#2d2d5e;color:#fff;font-weight:700;}
.day-btn .day-num{font-size:10px;background:#333;border-radius:3px;padding:1px 5px;min-width:26px;text-align:center;}
.day-btn.active .day-num{background:#4a4aaa;}
.day-btn .day-done{width:8px;height:8px;border-radius:50%;background:#2a2;margin-left:auto;flex-shrink:0;}
/* Main */
#main{flex:1;overflow-y:auto;padding:0;}
#content-area{max-width:860px;margin:0 auto;padding:24px 28px 60px;}
/* Day header */
.day-header{margin-bottom:20px;}
.day-header .meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.phase-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.date-badge{font-size:12px;color:#888;}
.day-header h2{font-size:22px;font-weight:700;color:#111;margin-bottom:6px;}
.day-header .goal-box{background:#fff;border-left:3px solid #4a4aaa;padding:10px 14px;border-radius:0 6px 6px 0;font-size:13px;color:#444;line-height:1.5;}
/* Concept section */
.section-title{font-size:12px;font-weight:700;letter-spacing:.06em;color:#888;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:6px;}
.concept-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:10px;overflow:hidden;}
.concept-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
.concept-header:hover{background:#fafafa;}
.concept-header h3{font-size:14px;font-weight:700;color:#222;}
.concept-toggle{font-size:18px;color:#aaa;transition:transform .2s;}
.concept-toggle.open{transform:rotate(180deg);}
.concept-body{padding:0 16px 14px;display:none;}
.concept-body.show{display:block;}
.concept-desc{font-size:13px;color:#444;line-height:1.6;margin-bottom:10px;}
.code-block{background:#1e1e2e;color:#cdd6f4;font-family:'Consolas','D2Coding',monospace;font-size:12px;padding:14px 16px;border-radius:6px;overflow-x:auto;line-height:1.6;white-space:pre;}
/* Keywords */
.kw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;}
.kw-card{background:#fff;border:1px solid #e8e8e8;border-radius:6px;padding:10px 12px;cursor:pointer;transition:all .15s;user-select:none;}
.kw-card:hover{border-color:#4a4aaa;}
.kw-term{font-size:13px;font-weight:700;color:#222;margin-bottom:3px;}
.kw-def{font-size:12px;color:#666;line-height:1.4;display:none;}
.kw-card.flipped .kw-def{display:block;}
.kw-card.flipped .kw-term{color:#4a4aaa;}
.kw-hint{font-size:11px;color:#bbb;margin-top:2px;}
/* Problems */
.problem-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:12px;overflow:hidden;}
.problem-q{padding:16px;font-size:13px;color:#333;line-height:1.7;}
.problem-q pre{background:#f5f5f5;font-family:'Consolas','D2Coding',monospace;font-size:12px;padding:12px;border-radius:6px;margin:8px 0;overflow-x:auto;white-space:pre;line-height:1.6;}
.problem-q strong{font-weight:700;color:#111;}
.answer-btn{margin:0 16px 12px;padding:8px 16px;background:#f0f0f0;border:none;border-radius:6px;font-size:13px;cursor:pointer;color:#555;transition:all .15s;font-family:inherit;}
.answer-btn:hover{background:#e0e0e8;color:#333;}
.answer-area{border-top:1px solid #f0f0f0;padding:14px 16px;background:#f8f8ff;display:none;}
.answer-area.show{display:block;}
.answer-area .ans-label{font-size:11px;font-weight:700;color:#4a4aaa;margin-bottom:4px;letter-spacing:.05em;}
.answer-area .ans-val{font-size:14px;font-weight:700;color:#111;font-family:'Consolas','D2Coding',monospace;margin-bottom:8px;}
.answer-area .hint{font-size:12px;color:#555;line-height:1.5;border-top:1px solid #e8e8ef;padding-top:8px;margin-top:4px;}
/* AI section */
.ai-section{background:#fff;border:1px solid #e0d8ff;border-radius:8px;padding:16px;margin-top:8px;}
.ai-section-title{font-size:13px;font-weight:700;color:#4a4aaa;margin-bottom:8px;}
.ai-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.ai-btn{padding:8px 16px;background:#4a4aaa;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;}
.ai-btn:hover{background:#3939aa;}
.ai-btn:disabled{background:#ccc;cursor:not-allowed;}
.ai-btn.secondary{background:#fff;color:#4a4aaa;border:1px solid #c0b0ff;}
.ai-btn.secondary:hover{background:#f5f0ff;}
#ai-output{background:#f5f5ff;border-radius:6px;padding:14px;font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;min-height:60px;display:none;}
#ai-output.show{display:block;}
.ai-loading{color:#888;font-style:italic;}
/* Checklist */
.check-list{list-style:none;}
.check-list li{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px;color:#444;cursor:pointer;}
.check-list li:last-child{border-bottom:none;}
.check-list li input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;margin-top:1px;}
.check-list li.done{color:#999;text-decoration:line-through;}
/* Day17-19 special */
.review-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.review-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s;}
.review-card:hover{border-color:#4a4aaa;}
.review-card h4{font-size:13px;font-weight:700;margin-bottom:6px;}
.review-card p{font-size:12px;color:#666;line-height:1.4;}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:10px;}
/* Progress bar */
#progress-bar{height:3px;background:#e0e0e0;margin-bottom:0;}
#progress-fill{height:100%;background:linear-gradient(90deg,#4a4aaa,#6a6acc);transition:width .3s;}
/* Table */
table.summary{width:100%;border-collapse:collapse;font-size:12px;}
table.summary th,table.summary td{padding:7px 10px;border:1px solid #e8e8e8;text-align:left;}
table.summary th{background:#f5f5f5;font-weight:700;color:#333;}
table.summary td{color:#444;}
</style>
</head>

  <div id="sidebar-header">
    <h1>정보처리기사 실기</h1>

<main id="main">
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

</main>

<script>
const DAYS = [
{
  day:1, date:"3/30(일)", phase:"프로그래밍 언어 활용", phaseNum:1, color:"#534AB7", light:"#EEEDFE",
  title:"C 언어 기초 — 포인터·배열·재귀·구조체",
  goal:"C 코드를 읽고 변수 추적(트레이싱 표)으로 출력값을 정확히 맞힐 수 있다",
  concepts:[
    {title:"포인터 (Pointer)",
     desc:"메모리 주소를 저장하는 변수. * 연산자로 역참조(값 접근), & 연산자로 주소 참조. 포인터 선언 시 자료형에 * 붙임.",
     code:`#include <stdio.h>
int main() {
    int a = 10;
    int *p = &a;      // p는 a의 주소
    printf("%d\\n", *p); // 10 — 역참조
    *p = 20;           // a의 값 변경
    printf("%d\\n", a);  // 20
    return 0;
}`},
    {title:"배열과 포인터 관계",
     desc:"배열명 자체가 첫 번째 원소의 주소. arr[i] 와 *(arr+i) 는 완전히 동일. 포인터 산술: p+1은 자료형 크기만큼 이동.",
     code:`#include <stdio.h>
int main() {
    int arr[4] = {10, 20, 30, 40};
    int *p = arr;
    printf("%d\\n", *(p+2)); // 30 = arr[2]
    p++;                     // p → arr[1]
    printf("%d\\n", *p);     // 20
    printf("%d\\n", p[1]);   // 30 = *(p+1)
    return 0;
}`},
    {title:"재귀 함수 (Recursive Function)",
     desc:"함수가 자기 자신을 호출. 반드시 종료 조건(기저 조건) 필요. 호출 순서 및 리턴 순서를 표로 추적하는 연습 필수!",
     code:`#include <stdio.h>
int sum(int n) {
    if (n == 1) return 1;  // 기저 조건
    return n + sum(n-1);
}
/* sum(4) 추적:
   sum(4) = 4 + sum(3)
   sum(3) = 3 + sum(2)
   sum(2) = 2 + sum(1)
   sum(1) = 1
   → 1+2+3+4 = 10 */
int main() {
    printf("%d\\n", sum(4)); // 10
    return 0;
}`},
    {title:"구조체 (struct)",
     desc:"서로 다른 데이터 타입을 하나의 단위로 묶음. . 연산자로 멤버 접근, 포인터는 -> 연산자 사용.",
     code:`#include <stdio.h>
struct Student {
    char name[20];
    int score;
};
int main() {
    struct Student s = {"홍길동", 95};
    printf("%s: %d\\n", s.name, s.score);
    // 포인터로 접근
    struct Student *p = &s;
    printf("%s: %d\\n", p->name, p->score);
    return 0;
}`},
    {title:"증감 연산자 — 시험 단골!",
     desc:"후위 증감(a++, a--)은 현재 값 먼저 사용 후 증감. 전위 증감(++a, --a)은 증감 후 사용. 헷갈리면 무조건 표 그려서 추적!",
     code:`#include <stdio.h>
int main() {
    int a = 5;
    int b = a++;  // b=5, a=6 (후위: b에 5 저장 후 a증가)
    int c = ++a;  // a=7, c=7 (전위: 먼저 증가 후 c에 저장)
    printf("%d %d %d\\n", a, b, c); // 7 5 7
    return 0;
}`}
  ],
  keywords:[
    {term:"포인터 (*)",def:"메모리 주소를 저장하는 변수. int *p; 형태로 선언"},
    {term:"역참조 (*p)",def:"포인터 p가 가리키는 주소의 실제 값에 접근"},
    {term:"주소 연산자 (&)",def:"변수의 메모리 주소를 반환. p = &a 는 p에 a의 주소 저장"},
    {term:"기저 조건",def:"재귀 함수에서 재귀 호출을 멈추는 종료 조건"},
    {term:"후위 증감(a++)",def:"현재 값 먼저 사용하고 나서 1 증가"},
    {term:"전위 증감(++a)",def:"먼저 1 증가시키고 나서 값 사용"},
    {term:"구조체 멤버 접근",def:"일반 변수는 s.name, 포인터는 p->name"}
  ],
  problems:[
    {q:`다음 C 코드의 출력 결과를 쓰시오.

#include <stdio.h>
int main() {
    int a = 3, b = 5;
    int *p = &a, *q = &b;
    *p = *p + *q;
    *q = *p - *q;
    printf("%d %d\\n", a, b);
    return 0;
}`, a:"8 3", hint:"*p=a, *q=b. *p = 3+5 = 8(a=8). *q = 8-5 = 3(b=3). swap처럼 동작"},
    {q:`다음 C 코드의 출력 결과를 쓰시오.

#include <stdio.h>
int f(int n) {
    if (n <= 0) return 0;
    return f(n-2) + n;
}
int main() {
    printf("%d\\n", f(5));
    return 0;
}`, a:"9", hint:"f(5)=f(3)+5, f(3)=f(1)+3, f(1)=f(-1)+1=0+1=1 → 1+3+5=9"},
    {q:`다음 C 코드의 출력 결과를 쓰시오.

#include <stdio.h>
int main() {
    int a = 5;
    int b = ++a * 2;
    int c = a++ + b;
    printf("%d %d %d\\n", a, b, c);
    return 0;
}`, a:"7 12 18", hint:"++a → a=6, b=6*2=12. c=a+b=6+12=18, 이후 a++=7. 결과: 7 12 18"}
  ],
  checklist:["포인터 선언 및 역참조 이해","배열과 포인터의 관계 파악","재귀 함수 트레이싱 표 연습 3회 이상","구조체 선언 및 멤버 접근법 암기","전위/후위 증감 연산자 헷갈리지 않기"]
},
{
  day:2, date:"3/31(월)", phase:"프로그래밍 언어 활용", phaseNum:1, color:"#534AB7", light:"#EEEDFE",
  title:"C 언어 심화 — 비트연산·문자열·동적메모리",
  goal:"비트 연산 결과 계산, 문자열 함수 동작, 2차원 배열 구조를 이해한다",
  concepts:[
    {title:"비트 연산자",
     desc:"& (AND), | (OR), ^ (XOR), ~ (NOT), << (좌측시프트), >> (우측시프트). 시프트는 2의 거듭제곱 곱/나눗셈과 동일.",
     code:`#include <stdio.h>
int main() {
    int a = 12;   // 이진수: 1100
    int b = 10;   // 이진수: 1010
    printf("%d\\n", a & b);  // 1000 = 8
    printf("%d\\n", a | b);  // 1110 = 14
    printf("%d\\n", a ^ b);  // 0110 = 6
    printf("%d\\n", a << 1); // 11000 = 24 (×2)
    printf("%d\\n", a >> 1); // 0110 = 6  (÷2)
    return 0;
}`},
    {title:"문자열 처리 함수",
     desc:"strlen(문자열 길이), strcpy(복사), strcat(연결), strcmp(비교 — 같으면 0), strchr(문자 검색). <string.h> 포함 필요.",
     code:`#include <stdio.h>
#include <string.h>
int main() {
    char s1[20] = "Hello";
    char s2[] = "World";
    printf("%d\\n", strlen(s1));    // 5
    strcat(s1, s2);
    printf("%s\\n", s1);            // HelloWorld
    printf("%d\\n", strcmp("abc","abc")); // 0 (같음)
    printf("%d\\n", strcmp("b","a"));    // 양수 (b>a)
    return 0;
}`},
    {title:"2차원 배열",
     desc:"행(row)과 열(col)로 구성. arr[행][열] 형태. 메모리는 행 우선(row-major) 순서로 저장.",
     code:`#include <stdio.h>
int main() {
    int arr[3][3] = {{1,2,3},{4,5,6},{7,8,9}};
    // 대각선 합 계산
    int sum = 0;
    for(int i=0; i<3; i++) sum += arr[i][i];
    printf("대각선 합: %d\\n", sum); // 1+5+9=15
    return 0;
}`},
    {title:"동적 메모리 할당",
     desc:"malloc(바이트 크기 할당), calloc(0으로 초기화), realloc(크기 변경), free(해제). <stdlib.h> 포함.",
     code:`#include <stdio.h>
#include <stdlib.h>
int main() {
    int n = 5;
    int *arr = (int*)malloc(n * sizeof(int));
    for(int i=0; i<n; i++) arr[i] = i*10;
    printf("%d %d\\n", arr[0], arr[4]); // 0 40
    free(arr); // 메모리 해제 필수!
    return 0;
}`}
  ],
  keywords:[
    {term:"& (비트 AND)",def:"두 비트가 모두 1일 때만 1. 12(1100) & 10(1010) = 8(1000)"},
    {term:"| (비트 OR)",def:"두 비트 중 하나라도 1이면 1. 12|10 = 14"},
    {term:"^ (비트 XOR)",def:"두 비트가 다를 때 1. 12^10 = 6"},
    {term:"<< n (좌시프트)",def:"비트를 왼쪽으로 n칸 이동 = 2ⁿ 곱하기"},
    {term:">> n (우시프트)",def:"비트를 오른쪽으로 n칸 이동 = 2ⁿ 나누기"},
    {term:"strlen(s)",def:"문자열 s의 길이 반환 (null 제외)"},
    {term:"strcmp(s1,s2)",def:"같으면 0, s1>s2면 양수, s1<s2면 음수"}
  ],
  problems:[
    {q:`다음 C 코드의 출력 결과를 쓰시오.

#include <stdio.h>
int main() {
    int a = 9;   // 1001
    int b = 6;   // 0110
    printf("%d\\n", a & b);
    printf("%d\\n", a | b);
    printf("%d\\n", a ^ b);
    return 0;
}`, a:"0\n15\n15", hint:"9=1001, 6=0110. AND=0000=0, OR=1111=15, XOR=1111=15"},
    {q:`다음 C 코드의 출력 결과를 쓰시오.

#include <stdio.h>
#include <string.h>
int main() {
    char a[] = "Infor";
    char b[] = "mation";
    strcat(a, b);
    printf("%d\\n", strlen(a));
    printf("%s\\n", a);
    return 0;
}`, a:"11\nInformation", hint:"strcat으로 b를 a 뒤에 붙임. Information = 11글자"},
    {q:`다음 C 코드에서 arr의 값 중 짝수만 출력하시오.

#include <stdio.h>
int main() {
    int arr[5] = {3, 8, 1, 6, 9};
    for(int i=0; i<5; i++)
        if(arr[i] % 2 == 0)
            printf("%d ", arr[i]);
    return 0;
}`, a:"8 6", hint:"arr[1]=8(짝수), arr[3]=6(짝수). 나머지 3,1,9는 홀수"}
  ],
  checklist:["비트 AND/OR/XOR/시프트 연산 손계산 연습","strlen/strcmp/strcat 함수 동작 암기","2차원 배열 인덱싱 연습","동적 메모리 malloc/free 개념 이해","기출 C 코드 10문제 풀기"]
},
{
  day:3, date:"4/1(화)", phase:"프로그래밍 언어 활용", phaseNum:1, color:"#534AB7", light:"#EEEDFE",
  title:"Java — OOP·상속·다형성·인터페이스",
  goal:"Java 코드에서 오버라이딩/오버로딩 결과, 상속 관계의 출력값을 정확히 예측한다",
  concepts:[

-- 해결책: 정규화를 통해 이상 현상 제거 --`}

let currentDay = 1;
let doneChecks = JSON.parse(localStorage.getItem('pjk_checks')||'{}');
let revealedAnswers = {};

// Build sidebar
function buildSidebar(){
  const list = document.getElementById('day-list');
  let phases = {};
  DAYS.forEach(d=>{
    if(!phases[d.phaseNum]) phases[d.phaseNum]=[];
    phases[d.phaseNum].push(d);
  });
  Object.keys(phases).forEach(pn=>{
    const col = PHASE_COLORS[pn];
    const lbl = document.createElement('div');
    lbl.className='phase-label';
    lbl.textContent = col.name;
    list.appendChild(lbl);
    phases[pn].forEach(d=>{
      const btn = document.createElement('button');
      btn.className='day-btn'+(d.day===currentDay?' active':'');
      btn.dataset.day=d.day;
      const checks = doneChecks[d.day]||[];
      const allDone = d.checklist && checks.length >= d.checklist.length;
      btn.innerHTML=`<span class="day-num">D${d.day}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.title.split('—')[0].trim()}</span>${allDone?'<span class="day-done"></span>':''}`;
      btn.onclick=()=>loadDay(d.day);
      list.appendChild(btn);
    });
  });
}

function loadDay(dayNum){
  currentDay = dayNum;
  revealedAnswers = {};
  document.querySelectorAll('.day-btn').forEach(b=>{
    b.classList.toggle('active', parseInt(b.dataset.day)===dayNum);
  });
  document.getElementById('progress-fill').style.width = ((dayNum/19)*100)+'%';
  renderContent(DAYS.find(d=>d.day===dayNum));
  document.getElementById('main').scrollTop=0;
}

    <div class="ai-section-title">Claude AI로 추가 연습 문제 생성</div>

      <button class="ai-btn" onclick="generateProblems('${d.title}', '${col.name}')">📝 연습 문제 3개 생성</button>
      <button class="ai-btn secondary" onclick="generateExplanation('${d.title}')">💬 개념 더 자세히 설명</button>
      <button class="ai-btn secondary" onclick="generateTips('${d.title}')">🎯 시험 출제 포인트</button>
    </div>
    <div id="ai-output"></div>
  </div>

  <div class="section-title">✅ 오늘의 체크리스트</div>
  <ul class="check-list">
    ${d.checklist.map((item,i)=>`
    <li class="${checks.includes(i)?'done':''}" onclick="toggleCheck(${d.day},${i},this)">
      <input type="checkbox" ${checks.includes(i)?'checked':''} onclick="event.stopPropagation();toggleCheck(${d.day},${i},this.closest('li'))">
      <span>${item}</span>
    </li>`).join('')}
  </ul>
  `;
  document.getElementById('content-area').innerHTML = html;
  // Auto expand first concept
  toggleConcept(0);
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toggleConcept(i){
  const body = document.getElementById('cb-'+i);
  const toggle = document.getElementById('ct-'+i);
  if(!body) return;
  body.classList.toggle('show');
  toggle.classList.toggle('open');
}
function flipKeyword(i){
  const card = document.getElementById('kw-'+i);
  const hint = document.getElementById('kwh-'+i);
  card.classList.toggle('flipped');
  hint.textContent = card.classList.contains('flipped') ? '다시 탭하면 닫힘' : '탭하여 정의 확인';
}
function toggleAnswer(id, btn){
  const area = document.getElementById(id);
  const show = area.classList.toggle('show');
  btn.textContent = show ? '정답 닫기' : '정답 보기';
}
function toggleCheck(dayNum, idx, li){
  let checks = doneChecks[dayNum]||[];
  if(checks.includes(idx)){
    checks = checks.filter(x=>x!==idx);
    li.classList.remove('done');
    li.querySelector('input').checked=false;
  } else {
    checks.push(idx);
    li.classList.add('done');
    li.querySelector('input').checked=true;
  }
  doneChecks[dayNum]=checks;
  localStorage.setItem('pjk_checks',JSON.stringify(doneChecks));
  // update sidebar
  const btn = document.querySelector(`.day-btn[data-day="${dayNum}"]`);
  if(btn){
    const d = DAYS.find(x=>x.day===dayNum);
    const allDone = d && checks.length >= d.checklist.length;
    const existingDot = btn.querySelector('.day-done');
    if(allDone && !existingDot){
      const dot = document.createElement('span');
      dot.className='day-done';
      btn.appendChild(dot);
    } else if(!allDone && existingDot){
      existingDot.remove();
    }
  }
}

async function callAI(prompt){
  const out = document.getElementById('ai-output');
  out.className='show ai-loading';
  out.textContent='AI가 생성 중입니다...';
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'당신은 정보처리기사 실기 시험 전문 강사입니다. 간결하고 실용적인 답변을 제공하세요. 실제 기출 스타일로 답변하세요.',
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await resp.json();
    const text = data.content?.map(c=>c.text||'').join('');
    out.className='show';
    out.textContent = text || '응답을 가져올 수 없습니다.';
  } catch(e){
    out.className='show';
    out.textContent='오류가 발생했습니다. 다시 시도해주세요.\n'+e.message;
  }
}

function generateProblems(title, phase){
  callAI(`정보처리기사 실기 시험 준비를 위한 "${title}" 관련 연습 문제를 3개 생성해주세요.\n\n요구사항:\n1. 실제 기출 시험 스타일로 작성\n2. 각 문제마다 정답과 간단한 해설 포함\n3. 단답형, 코드 출력값, 서술형을 골고루 포함\n4. 형식: 문제1. [문제] → 정답: [답] → 해설: [해설]`);
}
function generateExplanation(title){
  callAI(`정보처리기사 실기 시험에서 "${title}" 관련 개념을 시험에 나오는 핵심 위주로 쉽게 설명해주세요. 외워야 할 것, 자주 틀리는 것을 강조해주세요.`);
}
function generateTips(title){
  callAI(`정보처리기사 실기 시험에서 "${title}" 파트의 출제 경향과 고득점 포인트를 알려주세요. 자주 출제되는 유형 3가지와 각 유형별 공략법을 구체적으로 알려주세요.`);
}
